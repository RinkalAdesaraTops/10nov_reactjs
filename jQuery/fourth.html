<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: blue !important;
            height: 200px;
            width: 200px;
            border:2px solid black;
            margin:10px;
            position: absolute;
            top:50px;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <button id="btn1">Animation</button>
    <script src="jquery.min.js"></script>
    <script>
        $("#btn1").click(function(){
            // $(".box").animate({height:"toggle"})
            $(".box").animate({
                left:'350px',
                opacity:"0.3"
            },"slow")
        })
    </script>
</body>
</html>
